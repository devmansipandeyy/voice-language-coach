<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Language Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-ring { 0%{transform:scale(.8);opacity:.7} 80%,100%{transform:scale(2.2);opacity:0} }
    .pulse::before{content:"";position:absolute;inset:0;border-radius:9999px;background:currentColor;animation:pulse-ring 1.4s cubic-bezier(.2,.6,.4,1) infinite}
    .bar{display:inline-block;width:3px;margin:0 1px;background:#fff;border-radius:2px;animation:eq .9s ease-in-out infinite}
    @keyframes eq{0%,100%{height:6px}50%{height:20px}}
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
  <div class="mx-auto max-w-3xl px-4 py-8">
    <header class="mb-6">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-sky-400 to-violet-400 bg-clip-text text-transparent">
        🎙️ Voice Language Coach
      </h1>
      <p class="text-slate-400 mt-1">Have a live spoken conversation. Get a feedback report.</p>
    </header>

    <!-- Setup -->
    <section id="setup" class="bg-slate-900 rounded-2xl p-5 ring-1 ring-slate-800 shadow-xl">
      <div class="grid sm:grid-cols-3 gap-4">
        <label class="text-sm">Language
          <select id="language" class="mt-1 w-full bg-slate-800 rounded-lg px-3 py-2 ring-1 ring-slate-700">
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="en">English</option>
          </select>
        </label>
        <label class="text-sm">Level
          <select id="level" class="mt-1 w-full bg-slate-800 rounded-lg px-3 py-2 ring-1 ring-slate-700">
            <option>A1</option><option selected>A2</option><option>B1</option><option>B2</option><option>C1</option>
          </select>
        </label>
        <label class="text-sm">Scenario
          <select id="scenario" class="mt-1 w-full bg-slate-800 rounded-lg px-3 py-2 ring-1 ring-slate-700">
            <option value="free">Free conversation</option>
            <option value="cafe">At a café</option>
            <option value="directions">Asking directions</option>
            <option value="interview">Job interview</option>
            <option value="smalltalk">Small talk</option>
          </select>
        </label>
      </div>
      <div class="flex items-center justify-between mt-4">
        <label class="flex items-center gap-2 text-sm text-slate-300">
          <input id="corrections" type="checkbox" checked class="accent-violet-500 w-4 h-4" />
          Gentle inline corrections
        </label>
        <button id="startBtn" class="bg-violet-600 hover:bg-violet-500 transition px-5 py-2.5 rounded-xl font-semibold">
          Start session
        </button>
      </div>
    </section>

    <!-- Live -->
    <section id="live" class="hidden mt-6">
      <div class="flex items-center gap-3 mb-3">
        <span id="statusDot" class="relative inline-flex w-3 h-3 rounded-full text-emerald-400 bg-emerald-400"></span>
        <span id="statusText" class="text-sm text-slate-300">Connecting…</span>
        <span id="ttBadge" class="ml-auto text-xs text-slate-400 font-mono"></span>
      </div>

      <div id="log" class="bg-slate-900 rounded-2xl p-4 ring-1 ring-slate-800 h-80 overflow-y-auto space-y-3"></div>

      <!-- interim transcript -->
      <div id="interimWrap" class="mt-2 text-sm text-slate-400 italic min-h-[1.25rem]"></div>

      <div class="flex gap-3 mt-4">
        <button id="interruptBtn" class="flex-1 bg-slate-800 hover:bg-slate-700 transition px-4 py-2.5 rounded-xl">
          ✋ Interrupt
        </button>
        <button id="endBtn" class="flex-1 bg-rose-600 hover:bg-rose-500 transition px-4 py-2.5 rounded-xl font-semibold">
          End & get feedback
        </button>
      </div>
    </section>

    <!-- Report -->
    <section id="report" class="hidden mt-6 bg-slate-900 rounded-2xl p-6 ring-1 ring-slate-800"></section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
